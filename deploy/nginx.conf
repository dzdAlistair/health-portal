# 健康大数据门户平台 — Nginx 配置
# 部署路径: /etc/nginx/sites-available/health-portal

server {
    listen 80;
    server_name _;

    # 静态文件直接由 Nginx 服务
    location /static/ {
        alias /home/alistair/projects/health-portal/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Flask 反向代理
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # 文件上传大小限制
    client_max_body_size 10m;

    # 日志
    access_log /var/log/nginx/health-portal-access.log;
    error_log /var/log/nginx/health-portal-error.log;
}
