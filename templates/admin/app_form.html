<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增应用 — 第八组 后台</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="/admin/">🏥 管理后台</a>
    <div class="nav">
        <a class="nav-link text-white" href="/admin/">仪表盘</a>
        <a class="nav-link text-white" href="/admin/apps">应用管理</a>
        <a class="btn btn-outline-light btn-sm ml-2" href="/admin/logout">退出</a>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">➕ 新增应用</h4>
    <form method="post">
        <div class="form-row">
            <div class="form-group col-md-4">
                <label>应用名称</label>
                <input type="text" name="app_name" class="form-control" required>
            </div>
            <div class="form-group col-md-4">
                <label>跳转地址</label>
                <input type="url" name="app_url" class="form-control" required placeholder="https://...">
            </div>
            <div class="form-group col-md-2">
                <label>排序</label>
                <input type="number" name="sort" class="form-control" value="0">
            </div>
            <div class="form-group col-md-2">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">启用</option>
                    <option value="0">禁用</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>应用描述</label>
            <input type="text" name="app_desc" class="form-control">
        </div>
        <div class="form-group">
            <label>图标路径</label>
            <input type="text" name="app_icon" class="form-control" placeholder="如 /static/images/app_icon.png（可选）">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/admin/apps" class="btn btn-secondary">取消</a>
    </form>
</div>
<script src="/static/js/jquery.js"></script>
<script src="/static/js/bootstrap.js"></script>
</body>
</html>
