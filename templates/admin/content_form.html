<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增内容 — 第八组 后台</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="{{ url_for('admin.dashboard') }}">🏥 管理后台</a>
    <div class="nav">
        <a class="nav-link text-white" href="{{ url_for('admin.dashboard') }}">仪表盘</a>
        <a class="nav-link text-white" href="{{ url_for('admin.content_list') }}">内容管理</a>
        <a class="nav-link text-white" href="{{ url_for('admin.resource_list') }}">资源管理</a>
        <a class="btn btn-outline-light btn-sm ml-2" href="{{ url_for('admin.logout') }}">退出</a>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">➕ 新增内容</h4>
    <form method="post">
        <div class="form-row">
            <div class="form-group col-md-3">
                <label>内容类型</label>
                <select name="content_type" class="form-control" required>
                    <option value="news">新闻公告</option>
                    <option value="policy">政策资讯</option>
                    <option value="knowledge">健康知识</option>
                </select>
            </div>
            <div class="form-group col-md-3">
                <label>分类</label>
                <select name="category_id" class="form-control" required>
                    {% for cate in categories %}
                    <option value="{{ cate.cate_id }}">{{ cate.cate_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group col-md-2">
                <label>发布日期</label>
                <input type="date" name="publishing_date" class="form-control">
            </div>
            <div class="form-group col-md-2">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">已发布</option>
                    <option value="0">草稿</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>标题</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="form-group">
            <label>摘要</label>
            <input type="text" name="summary" class="form-control">
        </div>
        <div class="form-group">
            <label>正文</label>
            <textarea name="content" class="form-control" rows="6"></textarea>
        </div>
        <div class="form-group">
            <label>来源</label>
            <input type="text" name="source" class="form-control">
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('admin.content_list') }}" class="btn btn-secondary">取消</a>
    </form>
</div>
<script src="/static/js/jquery.js"></script>
<script src="/static/js/bootstrap.js"></script>
</body>
</html>
