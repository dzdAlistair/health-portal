<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>应用管理 — 第八组 后台</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="{{ url_for('admin.dashboard') }}">🏥 管理后台</a>
    <div class="nav">
        <a class="nav-link text-white" href="{{ url_for('admin.dashboard') }}">仪表盘</a>
        <a class="nav-link text-white" href="{{ url_for('admin.content_list') }}">内容管理</a>
        <a class="nav-link text-white" href="{{ url_for('admin.resource_list') }}">资源管理</a>
        <a class="nav-link text-white active" href="{{ url_for('admin.app_list') }}">应用管理</a>
        <a class="nav-link text-white" href="{{ url_for('admin.user_list') }}">用户管理</a>
        <a class="btn btn-outline-light btn-sm ml-2" href="{{ url_for('admin.logout') }}">退出</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📱 应用中心</h4>
        <a href="{{ url_for('admin.app_add') }}" class="btn btn-primary btn-sm">+ 新增应用</a>
    </div>

    <table class="table table-striped table-hover">
        <thead class="thead-dark">
            <tr><th>ID</th><th>应用名称</th><th>描述</th><th>跳转地址</th><th>排序</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody>
            {% if apps %}
            {% for a in apps %}
            <tr>
                <td>{{ a.app_id }}</td>
                <td>{{ a.app_name }}</td>
                <td>{{ a.app_desc or '-' }}</td>
                <td><a href="{{ a.app_url }}" target="_blank">{{ a.app_url[:30] }}...</a></td>
                <td>{{ a.sort }}</td>
                <td>
                    {% if a.status == 1 %}<span class="badge badge-success">启用</span>
                    {% else %}<span class="badge badge-secondary">禁用</span>{% endif %}
                </td>
                <td>
                    <a href="{{ url_for('admin.app_delete', app_id=a.app_id) }}" class="btn btn-danger btn-sm" onclick="return confirm('确认删除？')">删除</a>
                </td>
            </tr>
            {% endfor %}
            {% else %}
            <tr><td colspan="7" class="text-center text-muted">暂无应用</td></tr>
            {% endif %}
        </tbody>
    </table>
</div>
<script src="/static/js/jquery.js"></script>
<script src="/static/js/bootstrap.js"></script>
</body>
</html>
