<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>新增用户 — 第八组 后台</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <a class="navbar-brand" href="{{ url_for('admin.dashboard') }}">🏥 管理后台</a>
    <div class="nav">
        <a class="nav-link text-white" href="{{ url_for('admin.dashboard') }}">仪表盘</a>
        <a class="nav-link text-white" href="{{ url_for('admin.user_list') }}">用户管理</a>
        <a class="btn btn-outline-light btn-sm ml-2" href="{{ url_for('admin.logout') }}">退出</a>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">➕ 新增管理员</h4>
    <form method="post">
        <div class="form-row">
            <div class="form-group col-md-4">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group col-md-4">
                <label>密码</label>
                <input type="password" name="password" class="form-control" required minlength="6">
            </div>
            <div class="form-group col-md-2">
                <label>角色</label>
                <select name="role" class="form-control">
                    <option value="admin">普通管理员</option>
                    <option value="super_admin">超级管理员</option>
                </select>
            </div>
            <div class="form-group col-md-2">
                <label>状态</label>
                <select name="status" class="form-control">
                    <option value="1">正常</option>
                    <option value="0">禁用</option>
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('admin.user_list') }}" class="btn btn-secondary">取消</a>
    </form>
</div>
<script src="/static/js/jquery.js"></script>
<script src="/static/js/bootstrap.js"></script>
</body>
</html>
