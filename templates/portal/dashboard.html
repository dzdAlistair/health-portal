<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据可视化大屏 — 第八组 基于Hadoop的健康大数据门户平台</title>
    <link rel="stylesheet" href="/static/css/bootstrap.css">
    <script src="/static/js/jquery.js"></script>
    <script src="/static/js/echarts.js"></script>
    <style>
        body { background: #0a1628; color: #fff; }
        .navbar { margin-bottom: 0; }
        .chart-box { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        .chart-box h5 { text-align: center; color: #4fc3f7; margin-bottom: 10px; }
        .chart { width: 100%; height: 350px; }
        .row-flex { display: flex; flex-wrap: wrap; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-transparent">
    <div class="container">
        <a class="navbar-brand" href="/">← 返回首页</a>
        <span class="navbar-text">第八组 基于Hadoop的健康大数据门户平台</span>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row row-flex">
        <!-- 1. 各地区医疗机构数量 — 柱状图 -->
        <div class="col-md-6">
            <div class="chart-box">
                <h5>各地区医疗机构数量分布</h5>
                <div class="chart" id="chart_institution_region"></div>
            </div>
        </div>

        <!-- 2. 医疗机构类型分布 — 饼图 -->
        <div class="col-md-6">
            <div class="chart-box">
                <h5>医疗机构类型占比</h5>
                <div class="chart" id="chart_institution_type"></div>
            </div>
        </div>

        <!-- 3. 医疗资源统计 — 分组柱状图 -->
        <div class="col-md-12">
            <div class="chart-box">
                <h5>各地区床位 / 医生 / 护士资源对比</h5>
                <div class="chart" id="chart_medical_resources" style="height: 400px;"></div>
            </div>
        </div>

        <!-- 4. 内容发布趋势 — 折线图 -->
        <div class="col-md-6">
            <div class="chart-box">
                <h5>门户内容发布趋势</h5>
                <div class="chart" id="chart_content_trend"></div>
            </div>
        </div>

        <!-- 5. 数据资源类别 — 饼图 -->
        <div class="col-md-6">
            <div class="chart-box">
                <h5>数据资源类别分布</h5>
                <div class="chart" id="chart_resource_category"></div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/bootstrap.js"></script>
<script>
// ===== 1. 各地区医疗机构数量 — 柱状图 =====
$(function() {
    var c1 = echarts.init(document.getElementById('chart_institution_region'));
    $.get('/api/analysis/institution_by_region', function(res) {
        if (res.code !== 200) { console.error('API error'); return; }
        c1.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: { type: 'category', data: res.data.region, axisLabel: { rotate: 30 } },
            yAxis: { type: 'value', name: '数量' },
            series: [{ data: res.data.count, type: 'bar', itemStyle: { color: '#4fc3f7' } }]
        });
    });

    // ===== 2. 医疗机构类型分布 — 饼图 =====
    var c2 = echarts.init(document.getElementById('chart_institution_type'));
    $.get('/api/analysis/institution_type', function(res) {
        if (res.code !== 200) return;
        c2.setOption({
            tooltip: { trigger: 'item' },
            series: [{ type: 'pie', radius: '65%', data: res.data, emphasis: { itemStyle: { shadowBlur: 10 } } }]
        });
    });

    // ===== 3. 医疗资源统计 — 分组柱状图 =====
    var c3 = echarts.init(document.getElementById('chart_medical_resources'));
    $.get('/api/analysis/medical_resources', function(res) {
        if (res.code !== 200) return;
        c3.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['床位', '医生', '护士'], textStyle: { color: '#ccc' } },
            xAxis: { type: 'category', data: res.data.region },
            yAxis: { type: 'value' },
            series: [
                { name: '床位', type: 'bar', data: res.data.beds },
                { name: '医生', type: 'bar', data: res.data.doctors },
                { name: '护士', type: 'bar', data: res.data.nurses }
            ]
        });
    });

    // ===== 4. 内容发布趋势 — 折线图 =====
    var c4 = echarts.init(document.getElementById('chart_content_trend'));
    $.get('/api/analysis/content_trend', function(res) {
        if (res.code !== 200) return;
        c4.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['新闻', '政策', '知识'], textStyle: { color: '#ccc' } },
            xAxis: { type: 'category', data: res.data.month },
            yAxis: { type: 'value' },
            series: [
                { name: '新闻', type: 'line', data: res.data.news, smooth: true },
                { name: '政策', type: 'line', data: res.data.policy, smooth: true },
                { name: '知识', type: 'line', data: res.data.knowledge, smooth: true }
            ]
        });
    });

    // ===== 5. 数据资源类别 — 饼图 =====
    var c5 = echarts.init(document.getElementById('chart_resource_category'));
    $.get('/api/analysis/resource_category', function(res) {
        if (res.code !== 200) return;
        c5.setOption({
            tooltip: { trigger: 'item' },
            series: [{ type: 'pie', radius: '65%', roseType: 'area', data: res.data }]
        });
    });

    // 窗口大小变化时自适应
    window.addEventListener('resize', function() {
        c1.resize(); c2.resize(); c3.resize(); c4.resize(); c5.resize();
    });
});
</script>
</body>
</html>
